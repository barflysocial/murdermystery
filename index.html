<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Karaoke Killer</title>
  <link rel="stylesheet" href="styles.css?v=12" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="eyebrow">Crime 001</div>
      <h1 id="heroTitle">The Karaoke Killer</h1>
      <p class="sub" id="heroSub">A noir murder mystery at The Velvet Room. Press Start to begin Attempt 1.</p>
      <div class="start-wrap">
        <button id="startBtn" class="start-btn">Start</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar card">
        <section class="side-section">
          <div class="side-title">Active Run</div>
          <div class="score">
            <div class="mini">
              <span class="tiny">Round</span>
              <strong id="roundLabel">—</strong>
            </div>
            <div class="mini">
              <span class="tiny">Elapsed</span>
              <strong id="elapsedLabel">00:00</strong>
            </div>
            <div class="mini">
              <span class="tiny">Penalties</span>
              <strong id="penaltyLabel">+00:00</strong>
            </div>
            <div class="mini" id="finalTimeCard">
              <span class="tiny">Final Time</span>
              <strong id="finalTimeLabel">00:00</strong>
            </div>
            <div class="mini">
              <span class="tiny">Attempts</span>
              <strong id="attemptLabel">0</strong>
            </div>
          </div>
        </section>

        <section class="side-section">
          <div class="side-title">Navigation</div>
          <div class="nav" id="mainNav"></div>
        </section>

        <section class="side-section">
          <div class="side-title">Actions</div>
          <div class="actions">
            <button class="smallbtn" id="hintBtn">Use Hint</button>
            <button class="danger" id="attemptBtn">New Attempt</button>
          </div>
          <div class="notice" id="hintBox" hidden></div>
        </section>
      </aside>

      <main class="main card">
        <section class="panel" id="panel">
          <div class="empty">Loading case…</div>
        </section>
      </main>
    </div>
  </div>
  <script src="app.js?v=12"></script>
</body>
</html>
