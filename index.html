<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Police Academy</title>
  <link rel="stylesheet" href="styles.css?v=22" />
</head>
<body class="bg-art">
  <div class="app">
    <header class="hero">
      <div class="eyebrow">Training Case</div>
      <h1 id="heroTitle">Police Academy</h1>
      <div class="difficulty" id="difficultyLabel">Difficulty: Training</div>
      <p class="sub" id="heroSub">Learn how to investigate, unlock clues, and solve a case. Press Start to begin Attempt 1.</p>
      <div class="hero-top-image">
        <img src="./police_academy_home.png" alt="Police Academy training case art">
      </div>
      <div class="start-wrap">
        <button id="startBtn" class="start-btn">Start</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar card">
        <section class="side-section">
          <div class="side-title">Active Run</div>
          <div class="score">
            <div class="mini"><span class="tiny">Round</span><strong id="roundLabel">—</strong></div>
            <div class="mini"><span class="tiny">Elapsed</span><strong id="elapsedLabel">00:00</strong></div>
            <div class="mini"><span class="tiny">Penalties</span><strong id="penaltyLabel">+00:00</strong></div>
            <div class="mini" id="finalTimeCard"><span class="tiny">Final Time</span><strong id="finalTimeLabel">00:00</strong></div>
            <div class="mini"><span class="tiny">Attempts</span><strong id="attemptLabel">0</strong></div>
          </div>
        </section>

        <section class="side-section">
          <div class="side-title">Navigation</div>
          <div class="nav" id="mainNav"></div>
        </section>

        <section class="side-section">
          <div class="side-title">Actions</div>
          <div class="actions">
            <button class="smallbtn" id="hintBtn">Use Hint</button>
            <button class="danger" id="attemptBtn">New Attempt</button>
          </div>
          <div class="notice" id="hintBox" hidden></div>
        </section>
      </aside>

      <main class="main card">
        <section class="panel" id="panel">
          <div class="empty">Loading case…</div>
        </section>
      </main>
    </div>
  </div>
  <script src="app.js?v=22"></script>
</body>
</html>
