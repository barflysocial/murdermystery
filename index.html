<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Barfly Mystery Engine</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="backdrop"></div>
  <div class="grain"></div>

  <div class="app-shell">
    <header class="hero-shell">
      <div class="hero-copy">
        <div class="eyebrow" id="heroEyebrow">Mystery Engine</div>
        <h1 id="heroTitle">Barfly Mystery Engine</h1>
        <p class="sub" id="heroSub">Load a case, investigate scenes, unlock clues, question suspects, and make the final accusation.</p>
        <div class="hero-stats" id="heroStats"></div>
      </div>

      <div class="hero-console glass">
        <div class="console-head">
          <div>
            <div class="tiny-label">Case File</div>
            <div class="console-title" id="caseMetaLine">No case loaded.</div>
          </div>
          <div class="status-dot"></div>
        </div>

        <div class="casebar-row">
          <select id="caseSelect" aria-label="Case file"></select>
          <button class="smallbtn" id="loadCaseBtn">Load</button>
          <button class="smallbtn" id="newRunBtn">New Run</button>
          <button class="smallbtn ghostbtn" id="resumeBtn">Resume</button>
        </div>

        <div class="hero-progress-card">
          <div class="hero-progress-row">
            <span class="tiny-label">Case Progress</span>
            <span class="tiny-label" id="heroProgressText">0%</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="heroProgressFill"></div></div>
        </div>
      </div>
    </header>

    <div class="app-layout">
      <aside class="sidebar glass">
        <section class="side-block progress-block">
          <div class="side-head">
            <span class="side-title">Active Run</span>
          </div>
          <div class="metric-grid">
            <div class="metric-card">
              <span class="metric-label">Score</span>
              <strong id="score">0</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">Round</span>
              <strong id="roundLabel">—</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">Timer</span>
              <strong id="timerLabel">--:--</strong>
            </div>
          </div>
        </section>

        <section class="side-block">
          <div class="side-head"><span class="side-title">Navigation</span></div>
          <div class="nav rail" id="mainNav"></div>
        </section>

        <section class="side-block">
          <div class="side-head"><span class="side-title">Actions</span></div>
          <div class="actions">
            <button class="smallbtn" id="hintBtn">Use Hint</button>
            <button class="smallbtn" id="saveBtn">Save</button>
            <button class="smallbtn ghostbtn" id="loadBtn">Load</button>
            <button class="danger" id="resetBtn">Reset Case</button>
          </div>
          <div class="notice hint-notice" id="hintBox" hidden></div>
        </section>
      </aside>

      <main class="main-panel glass">
        <div class="tabs" id="tabs" hidden></div>
        <section class="panel" id="panel"></section>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
