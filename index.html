<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Barfly Mystery Engine — Crime 001</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">Barfly Mystery Engine</div>
      <div class="case-card">
        <div class="eyebrow">Case File</div>
        <h1 id="caseTitle">Loading…</h1>
        <p id="caseSubtitle"></p>
        <div class="actions-row">
          <button id="startBtn" class="primary">Start</button>
          <button id="resumeBtn">Resume</button>
          <button id="resetBtn" class="danger">Reset</button>
        </div>
      </div>
      <div class="run-card">
        <div class="eyebrow">Active Run</div>
        <div class="metric"><span>Round</span><strong id="roundLabel">—</strong></div>
        <div class="metric"><span>Score</span><strong id="scoreLabel">0</strong></div>
        <div class="metric"><span>Elapsed</span><strong id="elapsedLabel">00:00</strong></div>
        <div class="metric"><span>Penalties</span><strong id="penaltyLabel">+00:00</strong></div>
        <div class="metric total"><span>Final Time</span><strong id="finalTimeLabel">00:00</strong></div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="actions-row vertical">
        <button id="hintBtn">Use Hint</button>
        <button id="saveBtn">Save</button>
      </div>
      <div id="hintBox" class="hint-box hidden"></div>
    </aside>
    <main class="main">
      <div id="screen"></div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
